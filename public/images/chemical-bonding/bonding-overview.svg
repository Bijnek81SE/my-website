<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Overview of three bonding patterns</title>
  <desc id="desc">Three panels compare ionic electron transfer, equal covalent sharing, and unequal polar covalent sharing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">How valence electrons create bonds</text>
  <text x="600" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">Transfer, equal sharing, and unequal sharing</text>

  <g filter="url(#shadow)">
    <rect x="55" y="155" width="340" height="520" rx="28" fill="#ffffff"/>
    <rect x="430" y="155" width="340" height="520" rx="28" fill="#ffffff"/>
    <rect x="805" y="155" width="340" height="520" rx="28" fill="#ffffff"/>
  </g>

  <text x="225" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">Ionic</text>
  <text x="600" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">Non-polar covalent</text>
  <text x="975" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">Polar covalent</text>

  <circle cx="155" cy="365" r="65" fill="#dbeafe" stroke="#2563eb" stroke-width="5"/>
  <text x="155" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1d4ed8">Na</text>
  <circle cx="295" cy="365" r="65" fill="#ede9fe" stroke="#7c3aed" stroke-width="5"/>
  <text x="295" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#6d28d9">Cl</text>
  <circle cx="205" cy="320" r="10" fill="#0f172a"/>
  <line x1="215" y1="320" x2="255" y2="320" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="225" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">electron transfer</text>
  <text x="225" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Na⁺  ···  Cl⁻</text>
  <text x="225" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Opposite charges attract</text>

  <circle cx="530" cy="365" r="65" fill="#dcfce7" stroke="#16a34a" stroke-width="5"/>
  <text x="530" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15803d">C</text>
  <circle cx="670" cy="365" r="65" fill="#dcfce7" stroke="#16a34a" stroke-width="5"/>
  <text x="670" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15803d">C</text>
  <circle cx="588" cy="365" r="10" fill="#0f172a"/>
  <circle cx="612" cy="365" r="10" fill="#0f172a"/>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">approximately equal sharing</text>
  <text x="600" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">C—C</text>
  <text x="600" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Similar electronegativities</text>

  <circle cx="905" cy="365" r="65" fill="#dbeafe" stroke="#2563eb" stroke-width="5"/>
  <text x="905" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1d4ed8">C</text>
  <circle cx="1045" cy="365" r="65" fill="#fee2e2" stroke="#dc2626" stroke-width="5"/>
  <text x="1045" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#b91c1c">O</text>
  <circle cx="976" cy="365" r="10" fill="#0f172a"/>
  <circle cx="1000" cy="365" r="10" fill="#0f172a"/>
  <path d="M965 430 Q1005 458 1040 430" fill="none" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="975" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">unequal sharing</text>
  <text x="975" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">C<tspan baseline-shift="super" font-size="13">δ+</tspan>—O<tspan baseline-shift="super" font-size="13">δ−</tspan></text>
  <text x="975" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Electron density shifts toward O</text>

  <rect x="105" y="605" width="240" height="42" rx="21" fill="#eff6ff"/>
  <text x="225" y="633" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">electrostatic attraction</text>
  <rect x="480" y="605" width="240" height="42" rx="21" fill="#f0fdf4"/>
  <text x="600" y="633" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">shared electron pair</text>
  <rect x="855" y="605" width="240" height="42" rx="21" fill="#fef2f2"/>
  <text x="975" y="633" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">bond dipole</text>
</svg>
