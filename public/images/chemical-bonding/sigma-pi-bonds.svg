<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Sigma and pi bond orbital overlap</title>
  <desc id="desc">Left panel shows head-on overlap along the internuclear axis; right panel shows sideways p orbital overlap above and below the axis.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <radialGradient id="sigma" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="piTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg2)"/>
  <text x="600" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">Sigma and pi orbital overlap</text>
  <text x="600" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#475569">The geometry of overlap controls rotation and reactivity</text>

  <g filter="url(#shadow2)">
    <rect x="70" y="150" width="500" height="500" rx="28" fill="#fff"/>
    <rect x="630" y="150" width="500" height="500" rx="28" fill="#fff"/>
  </g>

  <text x="320" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8">σ bond</text>
  <text x="880" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#6d28d9">π bond</text>

  <line x1="155" y1="400" x2="485" y2="400" stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 8"/>
  <ellipse cx="250" cy="400" rx="118" ry="82" fill="#bfdbfe" opacity="0.65"/>
  <ellipse cx="390" cy="400" rx="118" ry="82" fill="#bfdbfe" opacity="0.65"/>
  <ellipse cx="320" cy="400" rx="112" ry="70" fill="url(#sigma)"/>
  <circle cx="250" cy="400" r="22" fill="#0f172a"/>
  <circle cx="390" cy="400" r="22" fill="#0f172a"/>
  <text x="320" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#334155">head-on overlap</text>
  <text x="320" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">electron density lies on the axis</text>
  <rect x="190" y="575" width="260" height="44" rx="22" fill="#eff6ff"/>
  <text x="320" y="604" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">allows rotation in single bonds</text>

  <line x1="715" y1="400" x2="1045" y2="400" stroke="#94a3b8" stroke-width="3" stroke-dasharray="10 8"/>
  <ellipse cx="810" cy="310" rx="60" ry="120" fill="#ddd6fe" opacity="0.8"/>
  <ellipse cx="950" cy="310" rx="60" ry="120" fill="#ddd6fe" opacity="0.8"/>
  <ellipse cx="810" cy="490" rx="60" ry="120" fill="#ddd6fe" opacity="0.8"/>
  <ellipse cx="950" cy="490" rx="60" ry="120" fill="#ddd6fe" opacity="0.8"/>
  <ellipse cx="880" cy="310" rx="105" ry="74" fill="url(#piTop)"/>
  <ellipse cx="880" cy="490" rx="105" ry="74" fill="url(#piTop)"/>
  <circle cx="810" cy="400" r="22" fill="#0f172a"/>
  <circle cx="950" cy="400" r="22" fill="#0f172a"/>
  <text x="880" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#334155">sideways p-orbital overlap</text>
  <text x="880" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">density lies above and below the axis</text>
  <rect x="750" y="605" width="260" height="34" rx="17" fill="#f5f3ff"/>
  <text x="880" y="628" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#6d28d9">restricts rotation in double bonds</text>
</svg>
