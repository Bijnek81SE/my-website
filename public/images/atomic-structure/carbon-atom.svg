<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Simplified carbon atom diagram</title>
  <desc id="desc">A carbon nucleus with six protons and six neutrons, surrounded by two electron shells containing six electrons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="48" fill="url(#bg)"/>
  <circle cx="600" cy="390" r="265" stroke="#93C5FD" stroke-width="5" stroke-dasharray="12 16"/>
  <circle cx="600" cy="390" r="155" stroke="#60A5FA" stroke-width="5"/>

  <g filter="url(#shadow)">
    <circle cx="600" cy="390" r="96" fill="#0F172A"/>
    <circle cx="570" cy="356" r="28" fill="#EF4444"/>
    <circle cx="622" cy="352" r="28" fill="#64748B"/>
    <circle cx="650" cy="400" r="28" fill="#EF4444"/>
    <circle cx="596" cy="410" r="28" fill="#64748B"/>
    <circle cx="548" cy="414" r="28" fill="#EF4444"/>
    <circle cx="604" cy="458" r="28" fill="#64748B"/>
    <text x="600" y="515" text-anchor="middle" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Nucleus</text>
  </g>

  <g fill="#2563EB" stroke="#DBEAFE" stroke-width="8">
    <circle cx="600" cy="235" r="22"/>
    <circle cx="600" cy="545" r="22"/>
    <circle cx="600" cy="125" r="22"/>
    <circle cx="820" cy="245" r="22"/>
    <circle cx="835" cy="535" r="22"/>
    <circle cx="365" cy="520" r="22"/>
  </g>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="70" width="290" height="180" rx="28" fill="white" stroke="#BFDBFE" stroke-width="3"/>
    <text x="110" y="125" fill="#0F172A" font-size="34" font-weight="700">Carbon</text>
    <text x="110" y="170" fill="#475569" font-size="25">Atomic number: 6</text>
    <text x="110" y="210" fill="#475569" font-size="25">Electron arrangement: 2, 4</text>

    <rect x="840" y="80" width="290" height="200" rx="28" fill="white" stroke="#BFDBFE" stroke-width="3"/>
    <circle cx="895" cy="135" r="18" fill="#EF4444"/>
    <text x="930" y="145" fill="#334155" font-size="24">Proton (+1)</text>
    <circle cx="895" cy="190" r="18" fill="#64748B"/>
    <text x="930" y="200" fill="#334155" font-size="24">Neutron (0)</text>
    <circle cx="895" cy="245" r="18" fill="#2563EB"/>
    <text x="930" y="255" fill="#334155" font-size="24">Electron (-1)</text>

    <rect x="430" y="650" width="340" height="64" rx="20" fill="#DBEAFE"/>
    <text x="600" y="693" text-anchor="middle" fill="#1E3A8A" font-size="25" font-weight="700">Simplified shell model</text>
  </g>
</svg>
